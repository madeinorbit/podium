<!doctype html>
<html lang="en">
  <head>
    <script>
      // Apply the stored theme before React mounts so the first paint matches
      // (no flash). Keys/values mirror src/theme.tsx exactly.
      (() => {
        try {
          var BG = {
            'podium-dark': '#0e0e12',
            'podium-light': '#f7f7f9',
            'shadcn-dark': '#09090b',
            'shadcn-light': '#ffffff',
            'superade-dark': '#0a0f1c',
            'superade-light': '#f4f6fb',
          }
          var p = localStorage.getItem('podium.theme.preset')
          var m = localStorage.getItem('podium.theme.mode')
          var preset = p === 'shadcn' || p === 'podium' || p === 'superade' ? p : 'superade'
          var mode = m === 'light' || m === 'dark' || m === 'system' ? m : 'dark'
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var isDark = mode === 'system' ? prefersDark : mode === 'dark'
          var el = document.documentElement
          var desktop = window.__PODIUM_DESKTOP__
          if (desktop && /^(macos|windows|linux)$/.test(desktop.platform)) {
            el.dataset.podiumDesktop = 'true'
            el.dataset.podiumPlatform = desktop.platform
          }
          if (preset === 'shadcn') el.removeAttribute('data-theme')
          else el.setAttribute('data-theme', preset)
          el.classList.toggle('dark', isDark)
          var meta = document.querySelector('meta[name="theme-color"]')
          var bg = BG[preset + '-' + (isDark ? 'dark' : 'light')]
          if (meta && bg) meta.setAttribute('content', bg)
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta
      name="description"
      content="Podium — agent workspace"
    />
    <meta name="theme-color" content="#0e0e12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Podium" />
    <title>Podium</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
