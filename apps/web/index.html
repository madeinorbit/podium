<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Podium</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
      #root { margin: 0; padding: 0; }

      /* App shell — fills the visual viewport (JS adjusts height + translateY for soft keyboard) */
      #app {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh; /* overridden by JS on visualViewport change */
        background: #000;
      }

      /* Terminal fills remaining space */
      #term {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      /* HUD — floating top-right overlay, always visible */
      #hud {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 6px;
        backdrop-filter: blur(4px);
        pointer-events: auto;
      }
      #hud button {
        padding: 3px 8px;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.12);
        color: #ddd;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        cursor: pointer;
        white-space: nowrap;
      }
      #hud button:hover { background: rgba(255, 255, 255, 0.2); }
      #status {
        font-family: monospace;
        font-size: 11px;
        color: #aaa;
        white-space: nowrap;
      }

      /* Mobile key toolbar — hidden on desktop, shown on touch (coarse pointer) */
      #toolbar {
        display: none;
        flex: 0 0 auto;
        overflow-x: auto;
        gap: 6px;
        padding: 6px;
        background: #1a1a1a;
        -webkit-overflow-scrolling: touch;
        /* no flex-wrap — horizontal scroll only */
      }
      @media (pointer: coarse) {
        #toolbar { display: flex; }
      }

      /* Toolbar buttons */
      #toolbar button {
        min-width: 44px;
        min-height: 40px;
        padding: 6px 10px;
        font-size: 15px;
        background: #2a2a2a;
        color: #eee;
        border: 1px solid #444;
        border-radius: 5px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        touch-action: manipulation;
      }
      #toolbar button:active { background: #444; }

      /* Sticky keys — Esc and Ctrl-C stick to the left, Enter sticks to the right */
      #toolbar button[data-key="Escape"],
      #toolbar button[data-key="Ctrl-C"] {
        position: sticky;
        left: 0;
        z-index: 10;
        background: #1e2a1e;
        border-color: #3a5a3a;
      }
      #toolbar button[data-key="Enter"] {
        position: sticky;
        right: 0;
        z-index: 10;
        background: #1e1e2a;
        border-color: #3a3a5a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
