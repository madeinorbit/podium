name: desktop release

# Desktop releases are explicit promotions, never a side effect of pushing main. [spec:SP-7f2c]
on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to promote
        required: true
        type: choice
        options:
          - edge
          - stable
      release_tag:
        description: Stable tag (vX.Y.Z); required for stable and ignored for edge
        required: false
        type: string
      release_notes:
        description: "Optional updater notes; begin with CRITICAL: for a required update"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v7
        with:
          # Stable builds the immutable release tag. Edge builds the ref selected in the
          # workflow-dispatch UI, making the promoted source commit explicit.
          ref: ${{ inputs.channel == 'stable' && inputs.release_tag || github.ref }}
      - uses: useblacksmith/setup-bun@v2
        with: { bun-version: '1.3.14' }
      - name: Validate release selection
        env:
          CHANNEL: ${{ inputs.channel }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: >-
          bun scripts/desktop-release.ts
          --validate-only
          --channel "$CHANNEL"
          --tag "$RELEASE_TAG"

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: blacksmith-4vcpu-ubuntu-2204
            build_args: ""
            apple_signing_identity: ""
            artifact_paths: |
              apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          - target: darwin-aarch64
            runner: blacksmith-6vcpu-macos-15
            build_args: "-- --target aarch64-apple-darwin"
            apple_signing_identity: "-"
            artifact_paths: |
              apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
              apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.channel == 'stable' && inputs.release_tag || github.ref }}
      - uses: useblacksmith/setup-bun@v2
        with: { bun-version: '1.3.14' }
      - name: Install Linux desktop build dependencies
        if: matrix.target == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            librsvg2-dev libayatana-appindicator3-dev libxdo-dev libssl-dev
      - uses: useblacksmith/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            packages/agent-bridge/src/abduco.bin
          key: desktop-build-${{ matrix.target }}-${{ hashFiles('bun.lock', 'apps/desktop/src-tauri/Cargo.lock') }}
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Build signed desktop bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
          BUILD_ARGS: ${{ matrix.build_args }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run --cwd apps/desktop build $BUILD_ARGS
      - name: Stage desktop bundle
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.target }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.channel == 'stable' && inputs.release_tag || github.ref }}
      - uses: useblacksmith/setup-bun@v2
        with: { bun-version: '1.3.14' }
      - name: Collect promoted desktop bundles
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          path: dist-desktop-input
      - name: Prepare and validate static updater manifest
        env:
          CHANNEL: ${{ inputs.channel }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: >-
          bun scripts/desktop-release.ts
          --channel "$CHANNEL"
          --tag "$RELEASE_TAG"
          --notes "$RELEASE_NOTES"
          --bundle-dir dist-desktop-input
      - name: Upload promoted desktop assets
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.channel }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          target_tag="$RELEASE_TAG"
          if [ "$CHANNEL" = "edge" ]; then target_tag=edge; fi
          gh release view "$target_tag" >/dev/null
          gh release upload "$target_tag" dist-desktop/* --clobber
