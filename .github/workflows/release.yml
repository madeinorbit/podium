name: release
on:
  push:
    branches: [main]          # → rolling edge headless assets only
    tags: ['v*']              # → stable headless assets only
permissions:
  contents: write
concurrency:
  group: headless-release-${{ github.ref_type == 'branch' && 'edge' || github.ref_name }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: blacksmith-4vcpu-ubuntu-2204
          # The compiled daemon embeds a native abduco helper, so ARM64 builds on
          # GitHub's native ARM64 runner rather than cross-compiling an x64 helper.
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.14' }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            packages/agent-bridge/src/abduco.bin
          key: headless-${{ matrix.arch }}-${{ hashFiles('bun.lock') }}
      # --ignore-scripts: the compiled headless runtime uses Bun.Terminal and never
      # loads node-pty. esbuild ships a platform package; build-bun compiles abduco.
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Build signed ${{ matrix.arch }} headless artifact
        env:
          PODIUM_UPDATE_SIGNING_KEY: ${{ secrets.PODIUM_UPDATE_SIGNING_KEY }}
        run: bun scripts/release.ts --channel ${{ github.ref_type == 'tag' && 'stable' || 'edge' }} --prepare-arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: headless-${{ matrix.arch }}
          path: dist-bun/release/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.14' }
      - uses: actions/download-artifact@v4
        with:
          pattern: headless-*
          path: dist-bun/release
          merge-multiple: true
      - name: Publish one multi-architecture release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            bun scripts/release.ts --channel stable --tag "${{ github.ref_name }}" --publish-dir dist-bun/release
          else
            bun scripts/release.ts --channel edge --publish-dir dist-bun/release
          fi
