name: release
on:
  push:
    branches: [main]          # → edge (headless only)
    tags: ['v*']              # → stable (headless + desktop)
permissions:
  contents: write
jobs:
  release:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v7
      - uses: useblacksmith/setup-bun@v2   # or oven-sh/setup-bun if unavailable
        with: { bun-version: '1.3.14' }
      - uses: useblacksmith/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            packages/agent-bridge/src/abduco.bin
          key: build-${{ hashFiles('bun.lock') }}
      # --ignore-scripts: the headless release compiles on Bun (Bun.Terminal PTY backend) and never
      # loads node-pty (lazily require()d only under the Node fallback), so its native rebuild is
      # dead weight here — and it crash-loops CI (node-gyp `webidl.util.markAsUncloneable` on the
      # runner toolchain). esbuild ships its binary via @esbuild/<platform> packages (no script),
      # and abduco is built by build-bun's own cc step, so skipping lifecycle scripts is safe.
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Headless build + publish
        env:
          PODIUM_UPDATE_SIGNING_KEY: ${{ secrets.PODIUM_UPDATE_SIGNING_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            bun scripts/release.ts --channel stable --tag "${{ github.ref_name }}"
          else
            bun scripts/release.ts --channel edge
          fi
      - name: Desktop build + publish (stable tags only)
        if: github.ref_type == 'tag'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GH_TOKEN: ${{ github.token }}
        run: |
          bun run --cwd apps/desktop build
          # Tauri emits the bundle, its .sig, and latest.json under apps/desktop/src-tauri/target/release/bundle
          gh release upload "${{ github.ref_name }}" \
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage* \
            apps/desktop/src-tauri/target/release/bundle/latest.json --clobber
